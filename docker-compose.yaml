version: '3.8'

services:

  # ─── PostGIS Database ───────────────────────────────────────────
  postgis:
    image: postgis/postgis:15-3.3
    container_name: oikn_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: gisuser
      POSTGRES_PASSWORD: gispassword
      POSTGRES_DB: gisdb
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./data/postgis/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gis_network

  # ─── GeoServer ──────────────────────────────────────────────────
  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: oikn_geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      INITIAL_MEMORY: 256M
      MAXIMUM_MEMORY: 1G
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/geoserver:/opt/geoserver/data_dir/data
    depends_on:
      - postgis
    networks:
      - gis_network

  # ─── Nginx (Reverse Proxy) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: oikn_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - geoserver
    networks:
      - gis_network

volumes:
  postgis_data:
  geoserver_data:

networks:
  gis_network:
    driver: bridge
